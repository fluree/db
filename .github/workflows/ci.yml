name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  # Linker experiment: was `-fuse-ld=bfd` (slowest GNU linker, set at the v4
  # baseline with no recorded rationale). `mold` links several times faster;
  # every compiling job below installs it via `rui314/setup-mold`.
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Clippy
        run: cargo clippy --all --all-features --all-targets

  test:
    runs-on: ubuntu-latest
    # Backstop so a hung/deadlocked test can never hold a runner for the full
    # 6h default again. Per-test kills are handled by `slow-timeout` in
    # `.config/nextest.toml`; this is the job-level safety net.
    timeout-minutes: 45
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Test
        run: cargo nextest run --workspace --all-features --no-fail-fast

  testsuite-sparql:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: "testsuite-sparql -> target"

      - name: Format
        working-directory: testsuite-sparql
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: testsuite-sparql
        run: cargo clippy --all-targets -- -D warnings

      - name: Check compiles (test targets)
        working-directory: testsuite-sparql
        run: cargo test --no-run
