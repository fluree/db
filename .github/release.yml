# Configuration for GitHub's auto-generated release notes.
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
#
# Used by `gh release create --generate-notes` in .github/workflows/release.yml
# to build the release body from merged PR titles since the previous tag.
#
# Categorization is label-driven. Apply labels to PRs to group them; PRs
# without one of the listed labels fall into "Other Changes".

changelog:
  exclude:
    authors:
      - dependabot
      - dependabot[bot]
      - github-actions[bot]
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - semver:major
    - title: Features
      labels:
        - feature
        - enhancement
        - feat
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Performance
      labels:
        - performance
        - perf
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Other Changes
      labels:
        - "*"
