# git-cliff configuration for Fluree DB
#
# Generates CHANGELOG.md from conventional-commit-style subjects matching
# the PR title convention documented in CLAUDE.md (feat/fix/docs/refactor/
# test/chore: short description).
#
# Run manually:   git cliff -o CHANGELOG.md
# Run for a tag:  git cliff --tag v4.0.2 -o CHANGELOG.md
#
# cargo-release invokes this automatically via the pre-release-hook in
# release.toml.

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""

# Tera template — see https://keats.github.io/tera/docs/
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first | trim }}\
    {% if commit.id %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/fluree/db/commit/{{ commit.id }})){% endif %}
{%- endfor %}
{% endfor %}
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false

# Match conventional-commit prefixes (with or without a scope), the breaking-
# change `!` marker, and merge commits. Anything else falls through to "Other".
commit_parsers = [
    { message = "^[Mm]erge (pull request|branch|remote-tracking branch)", skip = true },
    { message = "^release v?\\d", skip = true },
    { message = "^[Bb]ump version", skip = true },
    { message = "^chore\\(release\\):", skip = true },
    { message = "^fmt$", skip = true },

    { message = "^feat(\\(.*\\))?!?:", group = "Features" },
    { message = "^fix(\\(.*\\))?!?:", group = "Bug fixes" },
    { message = "^perf(\\(.*\\))?!?:", group = "Performance" },
    { message = "^refactor(\\(.*\\))?!?:", group = "Refactoring" },
    { message = "^docs(\\(.*\\))?!?:", group = "Documentation" },
    { message = "^test(\\(.*\\))?!?:", group = "Tests" },
    { message = "^build(\\(.*\\))?!?:", group = "Build" },
    { message = "^ci(\\(.*\\))?!?:", group = "CI" },
    { message = "^chore(\\(.*\\))?!?:", group = "Chore" },
    { message = "^style(\\(.*\\))?!?:", skip = true },

    # Catch-all so non-conforming commits still appear (instead of vanishing).
    { message = ".*", group = "Other" },
]

filter_commits = false
tag_pattern = "v[0-9]+.[0-9]+.[0-9]+"
ignore_tags = ""
topo_order = false
sort_commits = "newest"
